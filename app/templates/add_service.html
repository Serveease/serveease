{% extends 'base.html' %}
{% block title %}Add New Service{% endblock %}
{% block content %}
<div class="form-container">
  <h2>Add Service</h2>
  <form method="POST">
    <input name="title" placeholder="Service Title" required>
    <input name="department" placeholder="Department" required>
    <textarea name="description" placeholder="Description" required></textarea>
    <textarea name="requirements" placeholder="Requirements (optional)"></textarea>
    <textarea name="steps" placeholder="Steps (optional)"></textarea>
    <button type="submit">Add Service</button>
  </form>
</div>
{% endblock %}
