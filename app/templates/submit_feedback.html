{% extends 'base.html' %}
{% block title %}Submit Feedback{% endblock %}
{% block content %}
<div class="form-container">
    <h2>Submit Feedback / Complaint</h2>
    <form method="POST">
        <textarea name="message" rows="5" placeholder="Enter your concern or suggestion here..." required></textarea>
        <button type="submit">Submit</button>
    </form>
</div>
{% endblock %}
